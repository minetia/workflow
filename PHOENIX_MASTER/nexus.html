<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS HYPERCORE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.0.1/dist/lightweight-charts.standalone.production.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="neural-overlay"></div>
    
    {% include 'PHOENIX_MASTER/imperial_nav.html' %}

    <div class="hyper-container">
        <header class="q-header imperial-glass">
            <div class="brand-mod">
                <i class="fas fa-microchip fa-spin" style="color:var(--quantum-cyan); font-size:1.5rem;"></i>
                <div>
                    <h1>NEXUS HYPERCORE</h1>
                    <div class="sys-info">QUANTUM STATUS: <span class="blink">STABLE</span></div>
                </div>
            </div>
            
            <div class="sentiment-box">
                <div class="sent-bar-bg">
                    <div id="sent-fill" class="sent-bar-fill" style="width: 72%;"></div>
                </div>
                <div id="sent-text" class="sent-val">QUANTUM SYNC ACTIVE</div>
            </div>
        </header>

        <div class="core-grid">
            <div class="sector main-sector imperial-glass">
                <div class="sector-head">
                    <div class="asset-selector">
                        <p class="sys-info" style="margin-bottom:5px;">Target Neutralization</p>
                        <select id="target-coin" onchange="changeCore(this.value)">
                            <optgroup label="Core Assets">
                                <option value="KRW-BTC">Bitcoin (BTC)</option>
                                <option value="KRW-ETH">Ethereum (ETH)</option>
                                <option value="KRW-SOL">Solana (SOL)</option>
                                <option value="KRW-XRP">Ripple (XRP)</option>
                            </optgroup>
                            <optgroup label="Imperial Specimens">
                                <option value="KRW-BNB">Binance Coin (BNB)</option>
                                <option value="KRW-ADA">Cardano (ADA)</option>
                                <option value="KRW-DOGE">Dogecoin (DOGE)</option>
                                <option value="KRW-TRX">Tron (TRX)</option>
                                <option value="KRW-SUI">Sui (SUI)</option>
                                <option value="KRW-ONDO">Ondo (ONDO)</option>
                                <option value="KRW-ZRX">0x (ZRX)</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="live-ticker">
                        <span id="ticker-price">0.00</span>
                        <span id="ticker-change">+0.00%</span>
                    </div>
                </div>
                
                <div id="chart-container" class="chart-view"></div>
                
                <div class="control-deck">
                    <div class="wallet-stat">
                        <div class="lbl">Imperial Equity (KRW)</div>
                        <div id="core-balance" class="val">10,000,000</div>
                    </div>
                    <button id="btn-hyper" onclick="toggleHyper()" class="btn-hyper">
                        <i class="fas fa-power-off"></i> START ENGINE
                    </button>
                </div>
            </div>

            <div class="sector data-sector">
                <div class="sub-panel depth-panel imperial-glass">
                    <div class="sub-head"><i class="fas fa-layer-group"></i> Neural Depth</div>
                    <div class="depth-wrapper">
                        <canvas id="depth-chart"></canvas>
                        <div class="depth-labels">
                            <span style="color:var(--up)">BIDS</span>
                            <span style="color:var(--down)">ASKS</span>
                        </div>
                    </div>
                </div>

                <div class="sub-panel whale-panel imperial-glass">
                    <div class="sub-head"><i class="fas fa-bolt"></i> Quantum Trades</div>
                    <div id="trade-feed" class="feed-box no-scrollbar"></div>
                </div>

                <div class="sub-panel log-panel imperial-glass">
                    <div class="sub-head"><i class="fas fa-brain"></i> Imperial AI Logs</div>
                    <div id="ai-log" class="log-box no-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="overlay">
        <div class="loader-4d"></div>
        <div class="loading-text">RE-INITIALIZING NEXUS...</div>
    </div>

    <script src="simulator.js"></script>
</body>
</html>
