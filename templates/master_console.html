<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>EMPIRE COMMAND CENTER v5.0 (Integrated)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background: #000;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0c10 0%, #000 100%);
        }

        .sidebar {
            width: 550px;
            background: rgba(10, 12, 16, 0.7);
            border-right: 1px solid rgba(197, 160, 89, 0.2);
            display: flex;
            /* Changed to flex for fixed header */
            flex-direction: column;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 5;
            overflow: hidden;
            /* Scroll handled by child */
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            z-index: 5;
        }

        .go-btn {
            background: linear-gradient(135deg, #1f6feb 0%, #0d47a1 100%);
            color: white;
            border: none;
            padding: 4px 12px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(31, 111, 235, 0.3);
            transition: all 0.3s;
        }

        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(31, 111, 235, 0.5);
        }

        #console {
            background: rgba(0, 0, 0, 0.8);
            color: #34d399;
            padding: 25px;
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            border-top: 1px solid rgba(197, 160, 89, 0.1);
            white-space: pre-wrap;
            line-height: 1.8;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.9);
        }

        .root-control {
            background: rgba(197, 160, 89, 0.08);
            /* Slightly more prominent */
            padding: 20px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            /* Integrated border */
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .btn {
            background: linear-gradient(135deg, #c5a059 0%, #a67c37 100%);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.4);
        }

        /* 3D Master Drawer */
        #master-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(40px);
            border-right: 1px solid rgba(197, 160, 89, 0.3);
            z-index: 2000;
            transform-origin: left;
            transform: perspective(1000px) rotateY(-90deg);
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #master-drawer.open {
            transform: perspective(1000px) rotateY(0deg);
            box-shadow: 100px 0 200px rgba(0, 0, 0, 0.8);
        }

        .nav-category {
            margin-bottom: 5px;
        }

        .category-trigger {
            padding: 12px 20px;
            background: rgba(197, 160, 89, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s;
            display: flex;
            flex-direction: column;
            padding-left: 10px;
        }

        .nav-category.active .category-content {
            max-height: 500px;
            margin: 10px 0;
        }

        .nav-item {
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #8b949e;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .nav-item:hover {
            background: rgba(197, 160, 89, 0.1);
            color: #fff;
            padding-left: 25px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(197, 160, 89, 0.3);
            border-radius: 10px;
        }

        #hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #hamburger span {
            width: 25px;
            height: 2px;
            background: #c5a059;
            transition: 0.3s;
            box-shadow: 0 0 10px #c5a059;
        }

        #hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        #hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        #hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0a0c10;
            border: 1px solid #c5a059;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.2);
        }
    </style>
</head>

<body>
    <div id="canvas-bg"></div>

    {% with page_title="Master Console", page_subtitle="CONSUL TREE ARCHITECTURE" %}
    {% include 'PHOENIX_MASTER/imperial_nav.html' %}
    {% endwith %}

    <div style="display: flex; margin-top: 60px; height: calc(100vh - 60px);">
        <!-- Sidebar: File Tree -->
        <div class="sidebar">
            <div class="root-control">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="root-check" onclick="checkAll(this)">
                    <span style="color:#fbbf24; font-weight:900; font-size:12px; letter-spacing:1px;">🏰 [ROOT] 전체
                        제어</span>
                </div>
                <button class="btn" style="padding:8px 15px; font-size:10px;" onclick="openBatchModal()">LEGION
                    BATCH</button>
            </div>

            <div style="flex: 1; overflow-y: auto; padding: 20px 30px;">
                <pre id="tree-box" style="margin:0; line-height:2.5; font-size:13px;">{{ tree | safe }}</pre>
            </div>
        </div>

        <!-- Main Content: Terminal -->
        <div class="main">
            <div
                style="padding:15px 40px; background:rgba(197,160,89,0.05); border-bottom:1px solid rgba(197,160,89,0.2); display:flex; justify-content:flex-end; align-items:center; min-height: 60px;">
                <button class="btn" style="background: #da3633; color:#fff;" onclick="runBackup()">📦 CRYPTO SNAPSHOT
                    BACKUP</button>
            </div>
            <div id="console" style="flex: 1; min-height: 0;">Initializing Command Center... Ready for Directive.</div>
        </div>
    </div>

    <div id="unitModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color:#58a6ff;">유닛 개별 지시</h3>
            <input type="text" id="unitCmd"
                style="width:100%; padding:12px; background:#0d1117; color:white; border:1px solid #30363d; margin-top:15px;"
                placeholder="명령어를 입력하십시오...">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="flex:1;" onclick="sendInstruction()">🚀 하달</button>
                <button class="btn" style="flex:1; background:#da3633;" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="batchModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#39ff14;">🛡️ 제국 일괄 지시 (Batch)</h3>
            <p id="batchTargetCount" style="font-size:12px; color:#8b949e;"></p>
            <input type="text" id="batchCmd"
                style="width:100%; padding:12px; background:#0d1117; color:white; border:1px solid #30363d; margin-top:15px;"
                placeholder="선택된 모든 유닛에 내릴 명령...">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="flex:1;" onclick="sendBatchInstruction()">🔥 전군 하달</button>
                <button class="btn" style="flex:1; background:#da3633;" onclick="closeBatchModal()">취소</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let selectedUnit = "";

        // --- Quantum Background ---
        function initScene() {
            const canvas = document.createElement('canvas');
            document.getElementById('canvas-bg').appendChild(canvas);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;

            const particles = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 2000; i++) {
                pos.push((random() - 0.5) * 400, (random() - 0.5) * 400, (random() - 0.5) * 400);
            }
            particles.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const pMaterial = new THREE.PointsMaterial({ color: 0xc5a059, size: 0.5, transparent: true, opacity: 0.3 });
            const pSystem = new THREE.Points(particles, pMaterial);
            scene.add(pSystem);

            function animate() {
                pSystem.rotation.y += 0.001;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            function random() { return Math.random(); }
        }
        initScene();

        // --- Drawer & Category Logic ---
        function toggleConsoleDrawer() {
            document.getElementById('master-drawer').classList.toggle('open');
            document.getElementById('hamburger').classList.toggle('active');
        }

        function toggleCategory(elem) {
            const cat = elem.parentElement;
            const wasActive = cat.classList.contains('active');
            document.querySelectorAll('.nav-category').forEach(c => c.classList.remove('active'));
            if (!wasActive) cat.classList.add('active');
        }

        function checkAll(el) {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = el.checked);
        }

        function checkGroup(el) {
            const id = el.getAttribute('data-id');
            document.querySelectorAll(`.unit-check[data-parent="${id}"]`).forEach(c => c.checked = el.checked);
        }

        function openUnit(name) {
            selectedUnit = name;
            document.getElementById('modalTitle').innerText = "📍 유닛 워프: " + name;
            document.getElementById('unitModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('unitModal').style.display = "none"; }

        function openBatchModal() {
            const count = document.querySelectorAll('.unit-check:checked').length;
            if (count === 0) return alert("지시를 내릴 유닛을 먼저 선택하십시오.");
            document.getElementById('batchTargetCount').innerText = `${count}개의 유닛이 사령관님의 명령을 대기 중입니다.`;
            document.getElementById('batchModal').style.display = "flex";
        }

        function closeBatchModal() { document.getElementById('batchModal').style.display = "none"; }

        async function sendInstruction() {
            const cmd = document.getElementById('unitCmd').value;
            const con = document.getElementById('console');
            con.innerHTML += `<div style="color:#fbbf24;">[COMMAND] Directing to ${selectedUnit}: ${cmd}</div>`;
            await fetch(`/api/master/instruct?unit=${selectedUnit}&cmd=${encodeURIComponent(cmd)}`);
            closeModal();
        }

        async function sendBatchInstruction() {
            const cmd = document.getElementById('batchCmd').value;
            const units = Array.from(document.querySelectorAll('.unit-check:checked')).map(c => c.value);
            const con = document.getElementById('console');
            con.innerHTML += `<div style="color:red; font-weight:bold;">[BATCH] Imperial Decree issued to ${units.length} soldiers.</div>`;
            for (const unit of units) {
                await fetch(`/api/master/instruct?unit=${unit}&cmd=${encodeURIComponent(cmd)}`);
            }
            closeBatchModal();
        }

        async function runBackup() {
            const res = await fetch('/api/master/backup');
            const data = await res.json();
            if (data.status === 'ok') alert("백업 성공: " + data.filename);
            else alert("백업 실패: " + data.message);
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/master/logs');
                const data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    const con = document.getElementById('console');
                    const isAtBottom = con.scrollHeight - con.clientHeight <= con.scrollTop + 50;

                    data.logs.forEach(log => {
                        const line = document.createElement('div');
                        line.innerHTML = log;
                        con.appendChild(line);
                    });

                    if (isAtBottom) {
                        con.scrollTop = con.scrollHeight;
                    }
                }
            } catch (e) { console.error("Log Fetch Error:", e); }
            setTimeout(fetchLogs, 1000);
        }

        // --- Tree Accordion Logic ---
        let openedGroups = new Set(); // Store IDs of groups that are explicitly opened/closed

        function toggleTreeGroup(id) {
            const subDiv = document.getElementById(`sub-${id}`);
            const icon = document.getElementById(`toggle-icon-${id}`);
            if (subDiv.style.display === "none") {
                subDiv.style.display = "block";
                icon.innerText = "[-] ";
                openedGroups.add(id);
            } else {
                subDiv.style.display = "none";
                icon.innerText = "[+] ";
                openedGroups.delete(id);
            }
        }

        async function refreshTree() {
            try {
                const checkedUnits = Array.from(document.querySelectorAll('.unit-check:checked')).map(c => c.value);
                const checkedGroups = Array.from(document.querySelectorAll('.group-check:checked')).map(c => c.getAttribute('data-id'));
                const rootChecked = document.getElementById('root-check').checked;

                // Save current scroll position
                const treeContainer = document.getElementById('tree-box').parentElement;
                const scrollPos = treeContainer.scrollTop;

                const res = await fetch('/api/master/tree');
                const data = await res.json();
                if (data.tree) {
                    const treeBox = document.getElementById('tree-box');
                    treeBox.innerHTML = data.tree;

                    // Re-apply checkbox states
                    checkedUnits.forEach(val => {
                        const el = document.querySelector(`.unit-check[value="${val}"]`);
                        if (el) el.checked = true;
                    });
                    checkedGroups.forEach(id => {
                        const el = document.querySelector(`.group-check[data-id="${id}"]`);
                        if (el) el.checked = true;
                    });
                    document.getElementById('root-check').checked = rootChecked;

                    // Re-apply accordion states (default to closed if not in openedGroups)
                    document.querySelectorAll('[id^="sub-"]').forEach(div => {
                        const id = div.id.replace('sub-', '');
                        const icon = document.getElementById(`toggle-icon-${id}`);
                        if (openedGroups.has(id)) {
                            div.style.display = "block";
                            if (icon) icon.innerText = "[-] ";
                        } else {
                            div.style.display = "none";
                            if (icon) icon.innerText = "[+] ";
                        }
                    });

                    // Restore scroll position
                    treeContainer.scrollTop = scrollPos;
                }
            } catch (e) { console.error("Tree Refresh Error:", e); }
            setTimeout(refreshTree, 10000);
        }

        fetchLogs();
        refreshTree();
    </script>
</body>

</html>
