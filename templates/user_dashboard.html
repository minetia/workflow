<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Service | PHOENIX VIRTUAL EXCHANGE</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .citizen-hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(56, 139, 253, 0.1), rgba(14, 203, 129, 0.05));
            border-bottom: 1px solid var(--border);
        }

        .citizen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue-bright);
        }

        .service-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .service-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .service-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>

<body>
    {% include 'PHOENIX_MASTER/imperial_nav.html' %}




    <main>
        <div class="citizen-hero">
            <h1 style="font-size: 32px; font-weight: 900; color: #fff; margin-bottom: 12px;">제국 시민 서비스 센터</h1>
            <p style="color: var(--text-secondary); font-size: 16px;">안전하고 편리한 가상 자산 관리의 시작</p>
        </div>

        <div class="citizen-grid">
            <div class="service-card">
                <div class="service-icon">🏦</div>
                <div class="service-title">간편 자산 조회</div>
                <div class="service-desc">현재 보유 중인 제국 자산과 현실 브릿지 자산을 한눈에 확인하세요.</div>
            </div>
            <div class="service-card">
                <div class="service-icon">🛒</div>
                <div class="service-title">이지 트레이딩</div>
                <div class="service-desc">복잡한 차트 없이 클릭 몇 번으로 간편하게 코인을 사고파세요.</div>
            </div>
            <div class="service-card">
                <div class="service-icon">📜</div>
                <div class="service-title">시민 가이드</div>
                <div class="service-desc">제국 시스템 이용 방법과 보안 수칙을 쉽게 설명해 드립니다.</div>
            </div>
            <div class="service-card">
                <div class="service-icon">🤝</div>
                <div class="service-title">고객 지원</div>
                <div class="service-desc">궁금한 점이 있으신가요? 제국 도우미 AI가 즉시 답변해 드립니다.</div>
            </div>
        </div>
    </main>


</body>

</html>
