<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Site Under Maintenance</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0d1117;
            color: #8b949e;
            margin: 0;
        }

        .box {
            text-align: center;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 6px;
            background: #161b22;
        }

        h1 {
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>403 Forbidden</h1>
        <p>This resource is currently under scheduled maintenance.</p>
        <p>Please check back later.</p>
    </div>
</body>

</html>
