<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM FINANCE - Personal Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
        }

        .stat-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
        }
    </style>
</head>

<body class="p-6 md:p-12">
    {% include 'PHOENIX_MASTER/imperial_nav.html' %}
    <div class="mt-20 max-w-4xl mx-auto">
        <h1 class="text-4xl font-black mb-10 uppercase tracking-tighter">Quantum Finance</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="stat-card">
                <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Total PQC Spending</span>
                <span class="text-3xl font-black block mt-1 text-red-500">24,500 <span class="text-xs">PQC</span></span>
            </div>
            <div class="stat-card">
                <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Imperial Tax Paid</span>
                <span class="text-3xl font-black block mt-1 text-blue-500">1,225 <span class="text-xs">PQC</span></span>
            </div>
        </div>

        <div class="stat-card">
            <h3 class="text-lg font-black mb-6 uppercase">Recent Transactions</h3>
            <div class="space-y-4 text-xs">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-400">Imperial Feast Box</span>
                    <span class="font-bold text-red-400">-500 PQC</span>
                </div>
                <!-- More logs -->
            </div>
        </div>
    </div>
</body>

</html>
