<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPERIAL ESTATE - Housing & Rest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a10;
            color: #fff;
            margin: 0;
        }

        .house-card {
            background: #151520;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
    </style>
</head>

<body class="p-6 md:p-12">
    {% include 'PHOENIX_MASTER/imperial_nav.html' %}
    <div class="mt-20 max-w-6xl mx-auto">
        <h1 class="text-5xl font-black mb-12 uppercase tracking-tighter text-blue-400">Imperial Estate</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="house-card">
                <div class="h-64 bg-gray-800 flex items-center justify-center text-7xl">🏙️</div>
                <div class="p-8">
                    <h3 class="text-2xl font-bold mb-2">Phoenix Skymansion</h3>
                    <p class="text-gray-400 mb-6">Ultra-luxury suite overlooking the Quantum Core. Reserved for elite
                        members.</p>
                    <span class="text-3xl font-black text-white">500,000 <span
                            class="text-xs text-yellow-500 uppercase">PQC / Month</span></span>
                </div>
            </div>
            <div class="house-card">
                <div class="h-64 bg-gray-800 flex items-center justify-center text-7xl">🏘️</div>
                <div class="p-8">
                    <h3 class="text-2xl font-bold mb-2">Citizen Dormitory</h3>
                    <p class="text-gray-400 mb-6">Efficient, high-speed living units for active PQC traders.</p>
                    <span class="text-3xl font-black text-white">5,000 <span
                            class="text-xs text-yellow-500 uppercase">PQC / Month</span></span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
