<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Empire - {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --sidebar-width: 260px;
            --accent-cyan: #00f2ff;
            --accent-gold: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
        }

        nav#sidebar {
            width: var(--sidebar-width);
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            height: 100vh;
            position: fixed;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            margin-bottom: 50px;
            text-decoration: none;
        }

        .nav-link {
            padding: 15px 20px;
            text-decoration: none;
            color: #fff;
            opacity: 0.6;
            font-size: 0.9rem;
            transition: 0.3s;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .nav-link:hover,
        .nav-link.active {
            opacity: 1;
            background: var(--glass-bg);
            color: var(--accent-cyan);
            border-left: 3px solid var(--accent-cyan);
        }

        main#content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <div class="matrix-bg"></div>
    <nav id="sidebar">
        <a href="/" class="brand">ZION EMPIRE</a>
        <a href="/" class="nav-link {% if active_page == 'home' %}active{% endif %}">GLOBAL DASHBOARD</a>
        <a href="/archive" class="nav-link {% if active_page == 'archive' %}active{% endif %}">IMPERIAL ARCHIVE</a>
        <div style="margin-top: 30px; font-size: 0.7rem; opacity: 0.4; letter-spacing: 1px;">NATIONAL SECTORS</div>
        <a href="/nation/Alpha" class="nav-link">ALPHA SECTOR</a>
        <a href="/nation/Core" class="nav-link">CORE SECTOR</a>
        <a href="/nation/Empire" class="nav-link">EMPIRE SECTOR</a>
        <a href="/nation/Nexus" class="nav-link">NEXUS SECTOR</a>
        <a href="/nation/Zion" class="nav-link">ZION SECTOR</a>
    </nav>
    <main id="content">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
